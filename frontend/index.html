<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./css/index.css">
</head>
<body>
    <main>
        <div class = "app">
            <h1>P R O D U C T O S </h1>
            <div class="header"></div>
        </div>
        <form id = "formulario" class = "barra-agregar">
            <input type="text" id="entrada-nombre" placeholder="Nombre producto..."/>
            <input type="number" id="entrada-precio" placeholder="Precio..."/>
            <button id="btn-agregar">
                <i class="bi bi-cart-plus"></i>
                Agregar
            </button>
        </form>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th style="width: 42%">Nombre</th>
                        <th style="width: 18%">Precio</th>
                        <th style="width: 40%"> . . . </th>
                    </tr>
                </thead>
                <tbody id="tabla">
                    <tr>
                        <td clasa="td-nombre">Producto 1</td>
                        <td class="td_precio">$45</td>
                        <td>
                            <div class="btn-delete">
                                <button class="eliminar"><i class="bi bi-trash-fill"></i></button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
    <script src="js/obenerProducto.js"></script>
    <script src="js/crearProducto.js"></script>
    <script src="js/eliminarProducto.js"></script>
</body>
</html>
